name: Generate Proto

on:
  push:
    branches: [ main ]
    paths:
      - '**/v1/*.proto'
      - 'gomake.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          export PATH=$PATH:$(go env GOPATH)/bin

      - name: Generate Code
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          mkdir -p pkg/authv1 pkg/toolsv1 pkg/ragv1
          
          # Auth
          protoc --proto_path=. --proto_path=/usr/include --go_out=. --go_opt=module=github.com/xusk947/croki-proto --go-grpc_out=. --go-grpc_opt=module=github.com/xusk947/croki-proto auth/v1/auth.proto
          
          # Tools
          protoc --proto_path=. --proto_path=/usr/include --go_out=. --go_opt=module=github.com/xusk947/croki-proto --go-grpc_out=. --go-grpc_opt=module=github.com/xusk947/croki-proto tools/v1/tools.proto
          
          # Rag
          protoc --proto_path=. --proto_path=/usr/include --go_out=. --go_opt=module=github.com/xusk947/croki-proto --go-grpc_out=. --go-grpc_opt=module=github.com/xusk947/croki-proto rag/v1/rag.proto

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate protobuf code [skip ci]"
            git push origin main
          fi
