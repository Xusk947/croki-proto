vars:
  PROTOC_INCLUDE: /usr/include
---
generate:
  doc: Generate all Go protobuf and gRPC files
  script:
    - mkdir -p pkg/auth/v1 pkg/tools/v1 pkg/rag/v1
    
    # Auth
    - protoc --proto_path=. --proto_path={{ .Vars.PROTOC_INCLUDE }} --go_out=. --go_opt=module=github.com/xusk947/croki-proto --go-grpc_out=. --go-grpc_opt=module=github.com/xusk947/croki-proto auth/v1/auth.proto
    
    # Tools
    - protoc --proto_path=. --proto_path={{ .Vars.PROTOC_INCLUDE }} --go_out=. --go_opt=module=github.com/xusk947/croki-proto --go-grpc_out=. --go-grpc_opt=module=github.com/xusk947/croki-proto tools/v1/tools.proto
    
    # Rag
    - protoc --proto_path=. --proto_path={{ .Vars.PROTOC_INCLUDE }} --go_out=. --go_opt=module=github.com/xusk947/croki-proto --go-grpc_out=. --go-grpc_opt=module=github.com/xusk947/croki-proto rag/v1/rag.proto

build:
  doc: Generate and tidy
  script:
    {{include "generate"}}
    - go mod tidy
